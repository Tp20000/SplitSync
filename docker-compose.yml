version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: splitsync_postgres
    restart: always
    environment:
      POSTGRES_USER: splitsync
      POSTGRES_PASSWORD: splitsync
      POSTGRES_DB: splitsync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: splitsync_redis
    restart: always
    ports:
      - "6380:6379" # <--- CHANGED HOST PORT TO 6380
    command: redis-server --loglevel warning

volumes:
  postgres_data: