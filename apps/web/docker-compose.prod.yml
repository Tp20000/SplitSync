# FILE: docker-compose.prod.yml
# PURPOSE: Production Docker Compose configuration
# LAST UPDATED: F45 - GitHub Actions CI/CD

version: "3.9"

services:
  # ────────────────────────────────────────
  # PostgreSQL
  # ────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: splitsync_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - splitsync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────
  # Redis
  # ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: splitsync_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - splitsync-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────
  # Backend
  # ────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    container_name: splitsync_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      PORT: 5000
    networks:
      - splitsync-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ────────────────────────────────────────
  # Frontend
  # ────────────────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    container_name: splitsync_frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      NODE_ENV: production
    ports:
      - "80:3000"
    networks:
      - splitsync-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  splitsync-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: