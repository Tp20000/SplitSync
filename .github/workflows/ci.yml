# FILE: .github/workflows/ci.yml
# PURPOSE: Continuous Integration — lint + test on every push/PR
# LAST UPDATED: F45 - GitHub Actions CI/CD

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  POSTGRES_URL: "postgresql://postgres:postgres@localhost:5432/splitsync_test"
  REDIS_URL: "redis://localhost:6379"

jobs:
  # ─────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter (backend)
        run: npm run lint --workspace=server
        continue-on-error: true

      - name: Run linter (frontend)
        run: npm run lint --workspace=web
        continue-on-error: true

  # ─────────────────────────────────────────
  # Type Check
  # ─────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (backend)
        run: npm run build --workspace=server
        continue-on-error: true

      - name: Type check (frontend)
        run: npm run build --workspace=web
        continue-on-error: true

  # ─────────────────────────────────────────
  # Unit Tests
  # ─────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit --workspace=server

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/server/coverage/lcov.info
          flags: unit-tests
          fail_ci_if_error: false

  # ─────────────────────────────────────────
  # Integration Tests
  # ─────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: splitsync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: ./apps/server

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: ./apps/server
        env:
          DATABASE_URL: ${{ env.POSTGRES_URL }}

      - name: Run integration tests
        run: npm run test:integration --workspace=server
        env:
          DATABASE_URL: ${{ env.POSTGRES_URL }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: test_ci_secret_1234567890123456
          JWT_REFRESH_SECRET: test_ci_secret_1234567890123456
          NODE_ENV: test

  # ─────────────────────────────────────────
  # Build Check
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, test-integration]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --workspace=server

      - name: Build frontend
        run: npm run build --workspace=web

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/server/dist
            apps/web/.next
          retention-days: 7

  # ─────────────────────────────────────────
  # Summary
  # ─────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, test-integration, build]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY